<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" style="background:#0d1117">

<defs>
  <linearGradient id="neonGrad" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#0066ff"/>
    <stop offset="100%" stop-color="#ffd43b"/>
  </linearGradient>

  <!-- FIXED FILTER -->
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- Cube (Scaled up 1.5x and realigned) -->
<g stroke="url(#neonGrad)" fill="none" stroke-width="3"
   stroke-linecap="round" stroke-linejoin="round"
   filter="url(#glow)">

  <!-- Front square -->
  <rect x="80" y="140" width="150" height="150"/>

  <!-- Back square -->
  <rect x="170" y="80" width="150" height="150"/>

  <!-- Connections -->
  <line x1="80" y1="140" x2="170" y2="80"/>
  <line x1="230" y1="140" x2="320" y2="80"/>
  <line x1="230" y1="290" x2="320" y2="230"/>
  <line x1="80" y1="290" x2="170" y2="230"/>

</g>

<!-- Text -->
<g stroke="url(#neonGrad)" fill="none" filter="url(#glow)"
   transform="translate(420,0) skewX(-15)">

  <text x="0" y="300" stroke-width="3"
        font-family="Arial, sans-serif"
        font-size="220"
        font-weight="900"
        letter-spacing="8">
    Conduit
  </text>

  <line x1="10" y1="325" x2="1140" y2="325" stroke-width="3"/>
</g>

</svg>